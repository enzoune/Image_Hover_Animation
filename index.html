<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Hover</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">
        <div class="icon-image">

                <img src="img/ayone_haust.png" alt="">

                    <div class="details">

                    </div>
                </div>
            </div>
        </div>
